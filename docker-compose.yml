services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-reviewer-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL=${LLM_MODEL:-llama3-8b-8192}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: code-reviewer-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge