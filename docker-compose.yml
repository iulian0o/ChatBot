version: "3.9"

services:

  # Backend: Node.js, Express on port 4000
  backend:
    build:
      context: ./backend       
      dockerfile: Dockerfile
    container_name: code-reviewer-backend
    ports:
      - "4000:4000"            
    environment:
      - PORT=4000
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env                   
    networks:
      - app-network
    restart: unless-stopped

  # Frontend: React app served by Nginx on port 3000
  frontend:
    build:
      context: ./frontend      
      dockerfile: Dockerfile
    container_name: code-reviewer-frontend
    ports:
      - "3000:80"              
    depends_on:
      - backend               
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge